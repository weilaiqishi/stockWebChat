name: event_driven
display_name: 事件驱动
category: framework
description: 围绕业绩、政策、并购等事件分析催化强度与风险
instructions: |
  **事件驱动策略**

  ## 适用场景：公司或行业出现明确事件催化

  ### 1. 事件分类
  - 使用 `search_global` 或 `search_zhihu` 梳理近期关键事件。
  - 将事件分为：业绩类、政策类、订单/产品类、资本运作类、监管/风险类。
  - 明确事件发生时间，过期信息不能作为主要依据。

  ### 2. 影响路径
  - 判断事件影响的是收入、利润率、估值还是仅影响情绪。
  - 对重大订单或政策利好，说明兑现周期和不确定性。
  - 对监管、减持、处罚等事件，风险优先。

  ### 3. 市场反应
  - 使用 `get_realtime_quote` 和 `get_klines` 判断事件是否已被价格充分反映。
  - 放量上涨但未过关键阻力，可等待确认。
  - 高位放量滞涨或利好后冲高回落，应警惕兑现压力。

  ### 4. 输出要求
  - 明确事件性质：利好/利空/中性
  - 给出事件可信度和已反映程度
  - 操作建议必须包含失效条件
