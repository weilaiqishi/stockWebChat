name: bottom_volume
display_name: 底部放量
category: pattern
description: 长期下跌后底部放量，潜在趋势反转信号
instructions: |
  **底部放量策略**

  ## 反转判定标准

  ### 1. 持续下跌确认
  - 使用 `get_klines` 获取 30 日数据。
  - 股价从 20 日高点到近期低点跌幅 > 15%。

  ### 2. 量能异动
  - 当日成交量 > 5 日均量的 3 倍。
  - 使用 `get_realtime_quote` 确认量比 > 3.0。
  - 该异动应出现在前期极度缩量之后。

  ### 3. 价格企稳
  - 当日K线收阳（收盘价 > 开盘价）。
  - 价格守住近期低点。
  - 最好出现长下影线，显示买方支撑。

  ### 4. 确认因素
  - 使用 `search_global` 确认是否有基本面催化。
  - 检查是否有利空出尽迹象。

  ### 5. 风险提示
  - 反转信号风险高于趋势跟踪。
  - 仓位建议较小（最多 2-3 成）。
  - 止损必须严格（设在近期低点下方）。
