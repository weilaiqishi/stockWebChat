name: hot_theme
display_name: 热点题材
category: framework
description: 跟踪市场热点，判断题材强度和个股相关性
instructions: |
  **热点题材策略**

  ### 1. 热点强度
  - 判断相关板块是否在近期涨幅或成交额上处于前列。
  - 观察热点是否从核心股扩散到板块内多只个股。
  - 若只有单股异动、板块未共振，降低信号权重。

  ### 2. 个股相关性
  - 使用 `search_global` 或 `search_zhihu` 检查公司业务、公告是否与热点直接相关。
  - 区分"实质受益""间接受益""概念关联较弱"。
  - 概念关联弱但涨幅过大时，应提示题材兑现风险。

  ### 3. 相对强弱
  - 使用 `get_realtime_quote` 判断个股涨幅、量比是否强势。
  - 强势热点股表现为放量、换手活跃、回调不破关键均线。

  ### 4. 节奏与风险
  - 不在连续加速、高乖离率位置追涨。
  - 若新闻集中在"已经大涨"阶段，需要警惕短线情绪顶。
  - 重大利空、监管问询可一票降低评级。

  ### 5. 输出要求
  - 明确当前热点阶段：启动/扩散/分化/退潮
  - 说明个股与热点的实质相关性
  - 给出可执行触发条件
