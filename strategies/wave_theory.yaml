name: wave_theory
display_name: 波浪理论
category: framework
description: 基于艾略特波浪理论的浪型分析与目标价判断
instructions: |
  **波浪理论策略**

  ## 核心原则：市场按照 5 浪推进 + 3 浪调整的循环结构运行

  ### 1. 识别当前浪型
  使用 `get_klines` 获取近 120 日数据：

  推动浪（1-3-5）识别特征：
  - 第1浪：趋势反转的第一波，成交量温和放大。
  - 第3浪：最强劲的推动浪，通常放大量，绝不是最短浪。
  - 第5浪：量能往往弱于第3浪，出现顶背离则可能即将结束。

  调整浪（A-B-C）识别特征：
  - A 浪：第一次下跌，成交量较大。
  - B 浪：反弹，力度弱于前期涨幅，成交量萎缩，陷阱风险高。
  - C 浪：第二次下跌，力度往往超过 A 浪，完成调整。

  ### 2. 关键位置
  - 第2浪回调通常在第1浪的 38.2%~61.8%
  - 第3浪目标通常是第1浪的 1.618~2.618 倍延伸
  - 第4浪不得进入第1浪价格区域

  ### 3. 最优买点
  - 第2浪回调企稳（黄金坑）：最安全买点
  - 第4浪回调企稳：次优
  - 第3浪初期突破：放量突破第1浪高点时
  - 避免在第5浪末端追高（顶背离风险）

  ### 4. 输出要求
  - 给出当前可能的浪型位置
  - 给出关键斐波那契支撑/阻力位
  - 标注波浪计数的置信度（高/中/低）
