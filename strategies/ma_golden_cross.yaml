name: ma_golden_cross
display_name: 均线金叉
category: pattern
description: 检测均线金叉配合量能确认信号
instructions: |
  **均线金叉策略**

  ## 信号判定标准

  ### 1. 金叉检测
  - 使用 `get_klines` 获取日K线数据，检查均线排列。
  - 主信号：MA5 在最近 3 个交易日内上穿 MA10。
  - 强信号：MA10 上穿 MA20（更慢但更可靠）。
  - 检查 MACD 状态是否为金叉或零轴上方金叉。

  ### 2. 量能确认
  - 金叉日成交量应高于 5 日均量。
  - 金叉日量比 > 1.2 为积极信号。

  ### 3. 趋势背景
  - 盘整后金叉：最强信号
  - 上升趋势中金叉：延续信号
  - 深度下跌中金叉：弱信号，需更多确认

  ### 4. 价格位置
  - 价格应在交叉均线附近或上方
  - 乖离率 < 5%，避免追高延迟入场

  ### 5. 评分参考
  - MA5 × MA10 金叉配合量能：强烈看多
  - MA10 × MA20 金叉：看多
  - MACD 零轴上方金叉：额外加分
  - 理想买点设在交叉均线水平附近
