name: chan_theory
display_name: 缠论
category: framework
description: 基于缠论笔、线段、中枢结构分析
instructions: |
  **缠论分析策略**

  ## 核心框架：分型 → 笔 → 线段 → 中枢 → 趋势

  ### 1. 判断价格结构（中枢识别）
  - 使用 `get_klines` 获取近 60 日日线数据。
  - 识别近期价格的高低点序列，判断当前是否在震荡中枢还是趋势段。
  - 中枢：连续3段走势重叠区间，价格在此区间反复震荡。
  - 趋势：连续3个同级别中枢均向同一方向移动。

  ### 2. 背驰判断
  - 顶背驰：价格创新高但 MACD 红柱面积缩小 → 卖出/减仓信号。
  - 底背驰：价格创新低但 MACD 绿柱面积缩小 → 买入/加仓信号。
  - 使用 `get_klines` 获取数据，对比价格高低点与 MACD 状态。

  ### 3. 买卖点判定
  - 一买（最强）：下跌趋势中，最后一个中枢出现底背驰。
  - 二买：离开下跌中枢后的第一次回调不破中枢高点。
  - 三买：中枢震荡后向上突破（不回中枢内）。
  - 一卖/二卖/三卖：对称结构，方向相反。

  ### 4. 级别与仓位
  - 日线级别买卖点可用较重仓位 (30-50%)
  - 多级别共振（日线+周线同方向）时信号最强

  ### 5. 输出要求
  - 明确当前处于：上涨趋势/下跌趋势/中枢震荡
  - 指出是否存在背驰信号
  - 给出当前买卖点类型
  - 止损设于前低（买入时）或前高（卖出时）
