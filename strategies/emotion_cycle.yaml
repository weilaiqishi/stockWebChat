name: emotion_cycle
display_name: 情绪周期
category: framework
description: 基于市场情绪和换手率识别情绪低点与高点
instructions: |
  **情绪周期策略**

  ## 核心：市场情绪在"恐慌→悲观→怀疑→乐观→贪婪→狂热"之间循环

  ### 1. 换手率分析（情绪热度核心指标）
  使用 `get_klines` 和 `get_realtime_quote`：

  - 换手率 < 0.5%/日：市场冷淡，潜在底部区域。
  - 换手率 0.5%~2%：正常交投，情绪平稳。
  - 换手率 2%~5%：活跃，市场开始关注。
  - 换手率 > 5%：高热度，警惕情绪顶。
  - 换手率 > 10%：极度过热，通常为短期顶部。

  ### 2. 连续换手率走势
  - 由高向低 + 成交量萎缩 → 情绪退潮，耐心等待。
  - 由低向高 + 成交量陡增 → 情绪启动，可介入。
  - 突然单日暴量 → 往往是主力出货，需警惕。

  ### 3. 新闻情绪分析
  使用 `search_global` 或 `search_zhihu`：
  - 新闻集中"利好兑现、涨停"等 → 情绪可能过热。
  - 新闻集中"利空、下滑"等 → 悲观可能造就底部。

  ### 4. 情绪底部特征（买入区）
  满足以下 3 项以上：
  - 近 20 日换手率处于低位
  - 成交量持续萎缩
  - 新闻以负面为主
  - 股价在 MA20 附近或以下
  - MACD 出现底背离

  ### 5. 情绪顶部特征（减仓区）
  满足以下 3 项以上：
  - 近 5 日换手率大幅升高
  - 成交量脉冲式放大
  - 新闻以利好兑现、追捧为主
  - 股价偏离 MA5 超过 8%
  - MACD 出现顶背离
