name: volume_breakout
display_name: 放量突破
category: trend
description: 检测放量突破阻力位信号
instructions: |
  **放量突破策略**

  ## 突破判定标准

  ### 1. 阻力位识别
  - 使用 `get_klines` 获取日K线数据，识别前期高点或震荡平台顶部。
  - 通常为 20 日高点或前期密集成交区上沿。

  ### 2. 量能确认
  - 当日成交量 > 20 日均量的 1.5 倍。
  - 使用 `get_realtime_quote` 确认量比 > 1.5。

  ### 3. 价格确认
  - 收盘价必须站稳阻力位上方（至少 1 日）。
  - 收盘应在当日振幅上方 30%（强势收盘）。
  - 突破后乖离率检查：仍需 < 5%，避免追高。

  ### 4. 后续验证
  - 次日开盘应在突破位之上，区分真突破与假突破。

  ### 5. 买入信号
  1. 放量突破当日可试探性建仓 30%
  2. 回踩确认不破 + 缩量企稳 → 加仓至 70%
  3. 再次放量创新高 → 满仓

  ### 6. 假突破识别
  - 突破日成交量不足均量 1.2 倍
  - 突破当日收长上影线
  - 突破后次日即跌回阻力位下方

  ### 7. 止损设置
  - 止损位设在突破前低点下方 2%
  - 若突破后第 3 日仍无法站稳 → 减仓或离场
