name: one_yang_three_yin
display_name: 一阳夹三阴
category: pattern
description: 一阳夹三阴K线整理形态，趋势延续入场信号
instructions: |
  **一阳夹三阴策略**

  ## 形态定义（最近 5 个交易日）

  1. 第1日：大阳线（收盘价 > 开盘价，实体 > 股价的 2%）。
  2. 第2-4日：连续三根阴线或小K线：
     - 每根K线最低价不跌破第1日开盘价。
     - 成交量应逐步萎缩。
     - 三根K线应收在第1日实体范围内。
  3. 第5日：又一根阳线，收盘价突破第1日收盘价。

  ## 分析步骤
  1. 使用 `get_klines` 获取最近 10 日数据。
  2. 检查最后 5 根K线是否符合上述形态。
  3. 确认多头排列（MA5 > MA10 > MA20）加强信号可靠性。

  ## 评分参考
  - 形态成立 + 趋势看多：强烈看多
  - 理想买点设在第5日收盘价附近
  - 止损设在第1日开盘价下方
