name: box_oscillation
display_name: 箱体震荡
category: pattern
description: 在箱底买入、箱顶减仓，适用于横盘震荡行情
instructions: |
  **箱体震荡策略**

  ### 1. 箱体识别
  使用 `get_klines` 获取近 60~120 日数据：

  - 箱体顶部（阻力位）：近期多次触碰但未有效突破的高点连线。
  - 箱体底部（支撑位）：近期多次下探但未有效跌破的低点连线。
  - 箱体有效性：顶部和底部各至少触碰 2~3 次方可确认。

  ### 2. 当前位置判断
  使用 `get_realtime_quote` 获取现价，与箱体边界对比：

  - 箱底区域（距支撑 ≤5%）：买入/加仓信号，止损设箱底下方 3%。
  - 箱中区域：观望，不主动操作。
  - 箱顶区域（距阻力 ≤5%）：减仓/止盈信号。

  ### 3. 量能辅助
  - 箱底放量企稳：支撑有效，可较重仓。
  - 箱顶缩量滞涨：阻力有效，卖出信号。
  - 箱体向上有效突破 → 转为多头趋势策略
  - 箱体向下有效跌破 → 离场等待

  ### 4. 输出要求
  - 明确箱体顶部和底部价位
  - 当前价格所处区间
  - 若已突破，说明突破方向
