name: dragon_head
display_name: 龙头策略
category: trend
description: 板块轮动中识别龙头股
instructions: |
  **龙头策略**

  ### 1. 板块领涨地位
  - 确认该股是否在板块启动周期中率先上涨。
  - 龙头股通常在板块中涨幅领先、率先突破。

  ### 2. 换手率与动能
  - 使用 `get_realtime_quote` 检查换手率，龙头股换手率通常 > 5%。
  - 量比 > 1.5 说明有活跃的交易兴趣。

  ### 3. 相对强度
  - 对比个股涨跌幅与板块整体表现。
  - 真正的龙头在上涨日应跑赢板块。

  ### 4. 新闻催化
  - 使用 `search_global` 或 `search_zhihu` 搜索板块级催化剂。
  - 龙头行情常伴随板块整体催化。

  ### 5. 风险控制
  - 龙头股可适当放宽乖离率至 7%，但超过 10% 仍需谨慎。
  - 严格止损，避免高位接盘。
