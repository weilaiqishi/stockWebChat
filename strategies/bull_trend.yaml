name: bull_trend
display_name: 多头趋势跟踪
category: trend
description: 识别多头排列、趋势延续与回踩低吸机会
instructions: |
  **多头趋势跟踪策略**

  ## 分析框架

  ### 1. 趋势确认
  - 使用 `get_klines` 获取日K线数据，判断 MA5/MA10/MA20 排列。
  - MA5 >= MA10 >= MA20 且 MA20 斜率向上，视为多头结构。
  - 若价格显著跌破 MA20，则降低看多权重。

  ### 2. 位置与节奏
  - 优先"回踩不破"而非"高位追涨"。
  - 当价格距离 MA5/MA10 过远时，提示等待回踩。
  - 放量突破有效阻力时可提高胜率评级。

  ### 3. 量价验证
  - 使用 `get_klines` 检查突破日/反弹日是否放量。
  - 缩量上涨需谨慎，放量滞涨需警惕分歧。

  ### 4. 买入信号
  1. 首次回踩 MA10 或 MA20 获得支撑，收出下影线或阳线确认
  2. 缩量回调至 MA20 附近，次日放量阳线站上 MA5
  3. 均线多头排列中，MACD 在零轴上方金叉

  ### 5. 卖出/减仓信号
  1. 跌破 MA20 且次日无法收回 → 减仓 50%
  2. MA5 死叉 MA10 且放量下跌 → 清仓
  3. 高位放量长上影或大阴线 → 至少减仓 30%

  ### 6. 输出要求
  - 明确趋势方向（多头/震荡/转弱）
  - 给出关键均线位置和支撑/阻力位
  - 给出明确的买入/观望/减仓倾向
  - 必须给出止损参考（如 MA20 下方）
