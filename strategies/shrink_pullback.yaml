name: shrink_pullback
display_name: 缩量回踩
category: pattern
description: 上升趋势中的缩量回调是低风险买点
instructions: |
  **缩量回踩买点策略**

  ## 核心逻辑：上升趋势中的缩量回调是健康的洗盘行为

  ### 1. 前提条件
  - 中期趋势向上：使用 `get_klines` 确认 MA20 斜率 > 0，持续 10 个交易日以上

  ### 2. 回调幅度
  - 从近期高点回落 3%-8%（过深可能是趋势反转）

  ### 3. 量价关系
  - 回调期间成交量持续萎缩至前期均量的 50%-70%

  ### 4. 企稳信号
  - 在 MA10/MA20 处收出十字星、锤子线或阳包阴

  ### 5. 买入信号
  1. 缩量回踩 MA20 + 出现企稳 K 线形态 → 买入 50%
  2. 次日放量阳线确认 → 加仓至满仓
  3. MACD 在零轴上方拒绝死叉（DIF 拐头向上）→ 加仓信号

  ### 6. 不参与的情况
  - 回调放量（说明抛压重）
  - 跌破 MA60（中期趋势可能反转）
  - MACD 已下穿零轴
