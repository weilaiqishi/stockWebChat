name: expectation_repricing
display_name: 预期重估
category: framework
description: 寻找预期差修复或预期过热后的回落风险
instructions: |
  **预期重估策略**

  ### 1. 预期来源
  - 使用 `search_global` 或 `search_zhihu` 识别近期改变市场预期的信息。
  - 区分硬信息（公告、财报）和软信息（传闻、情绪）。

  ### 2. 预期差方向
  - 正向预期差：市场原本悲观，新增信息好于预期。
  - 负向预期差：市场原本乐观，新增信息低于预期。
  - 若信息已被连续大涨充分反映，提示预期兑现风险。

  ### 3. 估值重估
  - 使用 `get_instrument_info` 获取 PE/PB 等估值数据。
  - 估值提升需要匹配盈利质量和行业空间。
  - 估值回落时，观察是否由一次性扰动还是长期逻辑变化导致。

  ### 4. 价格确认
  - 使用 `get_klines` 判断预期变化是否已转化为趋势。
  - 放量突破可视为预期被资金确认。
  - 高位放量滞涨、利好不涨可能意味着预期转弱。

  ### 5. 输出要求
  - 明确当前是：正向预期差/预期兑现/负向预期差/预期不明
  - 给出观察点：下一份财报、订单兑现或技术确认
