name: growth_quality
display_name: 成长质量
category: framework
description: 识别高质量成长股与成长失速风险
instructions: |
  **成长质量策略**

  ### 1. 成长性
  - 优先查看基本面信息中的营业收入、净利润、经营现金流和 ROE。
  - 判断收入增长和利润增长是否同向。
  - 若只有概念热度但基本面尚未验证，应降低成长确定性。

  ### 2. 质量
  - ROE 越高且稳定，质量越好。
  - 经营现金流与净利润方向一致，说明盈利质量可靠。

  ### 3. 估值承受力
  - 使用 PE/PB 等指标判断市场是否已经提前透支成长。
  - 高成长可承受更高估值，但必须说明增长能否覆盖估值。
  - 估值高且成长放缓时，应明显下调评分。

  ### 4. 趋势确认
  - 使用 `get_klines` 判断长期成长逻辑是否被资金确认。
  - 基本面向好但技术面未确认时，优先给观察条件。

  ### 5. 输出要求
  - 明确公司处于：高质量成长/成长验证中/成长放缓
  - 说明成长来源（收入扩张/利润率改善/行业景气/一次性因素）
  - 给出适合成长股的买点条件
